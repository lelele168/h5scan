<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>快递扫码 · 拍照版</title>
    <!-- QuaggaJS 扫码库 -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <!-- Supabase JS 客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS 用于导出 XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* 样式与之前相同，省略以节省篇幅，实际使用时请保留完整样式 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
            color: #1e293b;
        }
        .app { max-width: 1200px; width: 100%; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .status-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
        }
        .sync-status.online { color: #10b981; }
        .sync-status.offline { color: #ef4444; }
        .sync-status.syncing { color: #f59e0b; }
        .local-mode-badge {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sound-toggle {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sound-toggle.on { color: #0284c7; }
        .sound-toggle.off { color: #94a3b8; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: #e2e8f0;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: #0284c7; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 8px 16px; font-size: 0.9rem; }
        .scanner-container {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #0f172a;
            margin: 20px 0;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
        }
        #interactive.viewport {
            position: relative;
            width: 100%;
            max-height: 400px;
            overflow: hidden;
        }
        #interactive.viewport video, #interactive.viewport canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        .scanner-controls { display: flex; gap: 12px; margin: 16px 0; justify-content: center; flex-wrap: wrap; }
        .manual-section { display: flex; gap: 12px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
        .note-section {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            align-items: center;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 60px;
        }
        .note-section input {
            flex: 1 1 180px;
            min-width: 150px;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .lock-toggle {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .lock-toggle.locked { color: #0284c7; border-color: #0284c7; background: #e0f2fe; }
        .lock-toggle.unlocked { color: #94a3b8; }
        .result-card {
            background: #e0f2fe;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            border-left: 6px solid #0284c7;
        }
        .result-card.invalid { border-left-color: #ef4444; background: #fee2e2; }
        .carrier-badge {
            background: #0284c7;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: inline-block;
            font-weight: 600;
        }
        .pending-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 6px;
        }
        .stats-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .carrier-stats { display: flex; flex-wrap: wrap; gap: 12px; }
        .carrier-stat {
            background: white;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 20px 0;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }
        .search-box {
            flex: 1 1 200px;
            min-width: 180px;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .clear-select {
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .data-source-switch {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .data-source-switch button {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }
        .data-source-switch button.active {
            background: #0284c7;
            color: white;
            border-color: #0284c7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.95rem;
            min-width: 800px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        th {
            padding: 16px 12px;
            background: #f1f5f9;
            font-weight: 600;
            text-align: left;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:nth-child(even) td { background: #fafafa; }
        .copy-btn, .delete-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        .copy-btn { color: #0284c7; }
        .delete-btn { color: #ef4444; }
        .export-btn { background: #0f172a; color: white; }
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            background: #f1f5f9;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast-message.show { opacity: 1; }
        .toast-message.success { background: #10b981; }
        .toast-message.error { background: #ef4444; }
        .toast-message.warning { background: #f59e0b; }
        .scan-toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .scan-toast.show { opacity: 1; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 16px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 28px;
            max-width: 400px;
            width: 100%;
        }
        .modal-content.large { max-width: 90vw; max-height: 90vh; }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .test-sound { margin: 12px 0; text-align: center; }
        .test-sound button {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            cursor: pointer;
        }
        .auth-container {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            border-radius: 40px;
            padding: 30px 24px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }
        .auth-title { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .auth-subtitle { text-align: center; color: #64748b; margin-bottom: 24px; }
        .auth-form { display: flex; flex-direction: column; gap: 16px; }
        .auth-form input {
            padding: 16px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: #f8fafc;
        }
        .error-msg { color: #dc2626; font-size: 0.9rem; margin-top: 8px; }
        .tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 8px 24px;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            color: #64748b;
            font-weight: 600;
        }
        .tab-btn.active { background: #e0f2fe; color: #0369a1; }
        .auth-footer { text-align: center; margin-top: 20px; cursor: pointer; color: #0284c7; }
        .photo-thumb { max-width: 60px; max-height: 60px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .photo-thumb:hover { opacity: 0.8; }
        .empty-search { text-align: center; padding: 30px; color: #94a3b8; font-size: 1rem; }
        @media (max-width: 640px) {
            .stats-panel { flex-direction: column; align-items: flex-start; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div class="header-row">
            <h1>📦 快递扫码 · 拍照版</h1>
            <div class="status-bar">
                <button id="soundToggleBtn" class="sound-toggle on" title="声音提醒">🔊 声音</button>
                <div id="syncStatus" class="sync-status online" style="display: none;">🟢 在线</div>
                <div id="localModeBadge" class="local-mode-badge" style="display: none;">📱 本地模式</div>
            </div>
        </div>

        <div id="userHeader" class="user-header" style="display: none;">
            <div id="userInfo"></div>
            <button id="logoutBtn" class="btn btn-sm">退出登录</button>
        </div>

        <!-- 认证区域 -->
        <div id="authArea" class="auth-container">
            <div class="auth-title">集派快递</div>
            <div class="auth-subtitle">扫码录入快人一步</div>
            <div class="tabs">
                <button id="loginTab" class="tab-btn active">登录</button>
                <button id="signupTab" class="tab-btn">注册</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="email" id="loginEmail" placeholder="邮箱" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <button id="loginBtn" class="btn btn-primary">登录</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="signupForm" class="auth-form" style="display: none;">
                <input type="text" id="signupUsername" placeholder="用户名（选填）">
                <input type="email" id="signupEmail" placeholder="邮箱*" required>
                <input type="password" id="signupPassword" placeholder="密码（至少6位）*" required>
                <input type="password" id="signupConfirm" placeholder="确认密码*" required>
                <button id="signupBtn" class="btn btn-primary">注册</button>
                <div id="signupError" class="error-msg"></div>
            </div>
            <div class="auth-footer">
                <span id="switchToSignup">还没有账号？立即注册→</span>
                <span id="switchToLogin" style="display: none;">已有账号？立即登录</span>
            </div>
            <button id="localModeBtn" class="btn btn-secondary" style="width:100%; margin-top:20px; background:white; border:1px dashed #94a3b8;">📱 本地模式（无需登录）</button>
        </div>

        <!-- 主应用区域 -->
        <div id="mainApp" style="display: none;">
            <div class="scanner-container">
                <div id="interactive" class="viewport"></div>
            </div>
            <div class="scanner-controls">
                <button id="startScanBtn" class="btn btn-success">▶️ 开始扫码</button>
                <button id="pauseScanBtn" class="btn btn-warning" style="display: none;">⏸️ 暂停扫码</button>
            </div>

            <div class="manual-section">
                <button id="manualBtn" class="btn btn-primary">📝 手动输入</button>
            </div>

            <div class="note-section">
                <input type="text" id="noteInput" placeholder="备注（可输可选）" list="noteOptionsDatalist">
                <datalist id="noteOptionsDatalist"></datalist>
                <button id="lockToggleBtn" class="lock-toggle unlocked" title="锁定备注">🔓 锁定</button>
            </div>

            <div class="test-sound">
                <button id="testSoundBtn">🔊 测试声音</button>
            </div>

            <div id="currentResult" class="result-card" style="display: none;">
                <h3>📌 最新扫描</h3>
                <p><strong>单号：</strong> <span id="trackingNumber"></span></p>
                <p><strong>快递公司：</strong> <span id="carrier"></span></p>
                <p><strong>时间：</strong> <span id="scannedAt"></span></p>
                <p id="duplicateHint" style="color: #f59e0b;"></p>
                <p id="photoHint" style="color: #10b981; margin-top:8px;"></p>
            </div>

            <!-- 统计面板 -->
            <div class="stats-panel" id="statsPanel">
                <div class="stat-item"><span class="stat-label">总记录数</span><span class="stat-value" id="totalCount">0</span></div>
                <div class="stat-item"><span class="stat-label">唯一单号</span><span class="stat-value" id="uniqueCount">0</span></div>
                <div class="carrier-stats" id="carrierStats"></div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <button id="searchBtn" class="btn btn-primary">🔍 搜索</button>
                <select id="clearRangeSelect" class="clear-select">
                    <option value="session">本次扫码</option>
                    <option value="day">最近一天</option>
                    <option value="week">最近一周</option>
                    <option value="all">全部</option>
                </select>
                <button id="clearRangeBtn" class="btn btn-danger">🗑️ 清空所选范围</button>
                <div class="data-source-switch">
                    <button id="dataSourceLocal" class="active">本地数据</button>
                    <button id="dataSourceCloud" class="cloud-btn">云端数据</button>
                    <button id="dataSourceAll">全部数据</button>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="exportCsvBtn" class="btn export-btn">📥 CSV</button>
                    <button id="exportXlsxBtn" class="btn btn-success">📊 XLSX</button>
                </div>
            </div>

            <!-- 数据表格 -->
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead><tr><th>单号</th><th>快递公司</th><th>首次扫描</th><th>最新扫描</th><th>次数</th><th>照片</th><th style="width:120px">操作</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
            <p id="noDataMsg" style="color:#94a3b8; text-align:center; padding:30px;">暂无记录</p>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button id="prevPageBtn" disabled>◀ 上一页</button>
                <span id="pageInfo">第 1 页 / 共 1 页</span>
                <button id="nextPageBtn" disabled>下一页 ▶</button>
            </div>
        </div>
    </div>
    <div class="footer-note">🔒 数据仅自己可见 · 离线自动同步 · 支持拍照上传</div>
</div>

<!-- 手动输入模态框 -->
<div id="manualModal" class="modal">
    <div class="modal-content">
        <h3>📝 手动输入单号</h3>
        <input type="text" id="manualModalInput" placeholder="单号" autocomplete="off">
        <div class="modal-buttons"><button id="manualModalCancel" class="btn">取消</button><button id="manualModalConfirm" class="btn btn-primary">确认</button></div>
    </div>
</div>

<!-- 搜索模态框（含结果列表，已移除扫码按钮） -->
<div id="searchModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <h3>🔍 搜索记录</h3>
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="searchInput" placeholder="单号" autocomplete="off" style="flex:1; padding:12px 16px; border:1px solid #e2e8f0; border-radius:40px;">
            <button id="searchModalBtn" class="btn btn-primary">搜索</button>
        </div>
        <!-- 搜索结果列表 -->
        <div id="searchResults" style="max-height: 400px; overflow-y: auto; border:1px solid #e2e8f0; border-radius:20px; padding:8px; margin-bottom:16px;"></div>
        <!-- 结果分页 -->
        <div class="pagination" id="searchPagination" style="margin-top:8px;">
            <button id="searchPrevPageBtn" disabled>◀ 上一页</button>
            <span id="searchPageInfo">第 1 页 / 共 1 页</span>
            <button id="searchNextPageBtn" disabled>下一页 ▶</button>
        </div>
        <div class="modal-buttons">
            <button id="searchModalCancel" class="btn">关闭</button>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div id="detailModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <h3 id="detailTitle">单号详情</h3>
        <div id="detailList" style="max-height: 400px; overflow-y: auto; border:1px solid #e2e8f0; border-radius:20px; padding:8px;"></div>
        <div class="modal-buttons"><button id="detailModalClose" class="btn btn-primary">关闭</button></div>
    </div>
</div>

<!-- 大图查看模态框 -->
<div id="imageModal" class="modal">
    <div class="modal-content large" style="background: transparent; box-shadow: none;">
        <img id="largeImage" style="max-width: 100%; max-height: 90vh; margin: auto; display: block; border-radius: 16px;">
        <div style="text-align: center; margin-top: 16px;"><button id="closeImageBtn" class="btn btn-primary">关闭</button></div>
    </div>
</div>

<!-- 全局提示 -->
<div id="toast" class="toast-message"></div>
<div id="scanToast" class="scan-toast"></div>

<script>
    // ================== 配置 ==================
    const SUPABASE_URL = 'https://vmkpymrujtvguvmzcisc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RKS87lNw-yOvLeZ9PU2SEw_U-3mKNUu';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 快递公司识别规则
    const carrierRules = [
        { name: '顺丰快递', regex: /^SF\d{13}$/i },
        { name: '圆通快递', regex: /^YT\d{13}$/i },
        { name: '中通快递', regex: /^(73|75|78)\d{11}$/ },
        { name: '申通快递', regex: /^(777|772)\d{12}$/ },
        { name: '韵达快递', regex: /^(46|43|31|32)\d{11,13}$/ },

    function speak(text) {
        if (!speechEnabled) return;
        if (!window.speechSynthesis) return;

        const voices = window.speechSynthesis.getVoices();
        let preferredVoice = voices.find(v => v.lang.includes('zh') && v.name.includes('Google 普通话'));
        if (!preferredVoice) {
            preferredVoice = voices.find(v => v.lang.includes('zh') && v.name.includes('Female'));
        }
        if (!preferredVoice) {
            preferredVoice = voices.find(v => v.lang.includes('zh'));
        }

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 1.2;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        if (preferredVoice) utterance.voice = preferredVoice;
        window.speechSynthesis.speak(utterance);
    }

    function performSearch() {
        const keyword = searchInput.value.trim().toLowerCase();
        let filtered = allRecords.filter(r =>
            r.tracking_number.toLowerCase().includes(keyword) ||
            (r.carrier && r.carrier.toLowerCase().includes(keyword))
        );
        const groups = {};
        filtered.forEach(rec => {
            const num = rec.tracking_number;
            if (!groups[num]) {
                groups[num] = {
                    tracking_number: num,
                    records: [],
                    carrier: rec.carrier,
                    last_time: rec.scanned_at,
                    count: 0
                };
            }
            groups[num].records.push(rec);
            if (new Date(rec.scanned_at) > new Date(groups[num].last_time)) {
                groups[num].last_time = rec.scanned_at;
                groups[num].carrier = rec.carrier;
            }
            groups[num].count++;
        });
        searchResults = Object.values(groups).sort((a,b) => new Date(b.last_time) - new Date(a.last_time));
        searchCurrentPage = 1;
        renderSearchResults();
    }

    // ================== 本地存储 ==================
    const STORAGE_KEY = 'pending_scans';
    function loadPendingFromStorage() {

        if (stored) { try { pendingRecords = JSON.parse(stored); } catch(e){ pendingRecords=[]; } }
        else pendingRecords = [];

    function savePendingToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(pendingRecords)); }
    function addPendingRecord(record) {

    // ================== 同步状态 ==================
    function updateSyncStatusUI() {
        if (isLocalMode) {
            syncStatusDiv.style.display = 'none';
            localModeBadge.style.display = 'flex';
            return;
        }
        syncStatusDiv.style.display = 'flex';
        localModeBadge.style.display = 'none';
        if (!isOnline) syncStatusDiv.className = 'sync-status offline';
        else syncStatusDiv.className = pendingRecords.length ? 'sync-status syncing' : 'sync-status online';
        syncStatusDiv.innerHTML = !isOnline ? `🔴 离线 <span class="badge">${pendingRecords.length}</span>` : pendingRecords.length ? `🟡 待同步 <span class="badge">${pendingRecords.length}</span>` : '🟢 在线';
    }
    window.addEventListener('online', () => { isOnline=true; updateSyncStatusUI(); if (!isLocalMode && currentUser) syncPendingRecords(); });
    window.addEventListener('offline', () => { isOnline=false; updateSyncStatusUI(); });

    async function syncPendingRecords() {
        if (isLocalMode || !currentUser || !isOnline || pendingRecords.length===0) return;
        syncStatusDiv.innerHTML = '🟡 同步中...';
        for (const record of pendingRecords) {
            try {
                const { error } = await sbClient.from('scans').insert([{
                    tracking_number: record.tracking_number,
                    carrier: record.carrier,
                    notes: record.notes || '',
                    photo_url: record.photo_url || null,
                    scanned_at: record.scanned_at,
                    user_id: currentUser.id
                }]);
                if (!error) pendingRecords = pendingRecords.filter(r => r.localId !== record.localId);
            } catch (e) {}
        }
        savePendingToStorage();
        updateSyncStatusUI();
        if (dataSourceMode !== 'local') await loadCloudData();
        applyDataSource();
        speak('同步完成');
    }

    async function loadCloudData() {
        if (isLocalMode || !currentUser) return;
        try {
            const { data, error } = await sbClient.from('scans').select('*').eq('user_id', currentUser.id).order('scanned_at', { ascending: false });
            if (error) throw error;
            cloudData = (data || []).map(item => ({ ...item, localId: null, pending: false }));
            cloudDataLoaded = true;
        } catch (err) { console.error('加载云端数据失败', err); showToast('加载云端数据失败', 'error'); }
    }

    // ================== 分组 ==================
    function groupRecords(records) {
        const groups = {};
        records.forEach(rec => {
            const num = rec.tracking_number;
            if (!groups[num]) {
                groups[num] = { tracking_number: num, records: [], carrier: rec.carrier, first_time: rec.scanned_at, last_time: rec.scanned_at, count:0 };
            }
            groups[num].records.push(rec);
            if (new Date(rec.scanned_at) < new Date(groups[num].first_time)) groups[num].first_time = rec.scanned_at;
            if (new Date(rec.scanned_at) > new Date(groups[num].last_time)) {
                groups[num].last_time = rec.scanned_at;
                groups[num].carrier = rec.carrier;
            }
            groups[num].count++;
        });
        return Object.values(groups).sort((a,b) => new Date(b.last_time) - new Date(a.last_time));
    }

    // ================== 数据源应用 ==================
    function applyDataSource() {
        let baseRecords = [];
        if (isLocalMode) baseRecords = pendingRecords;
        else {
            const combined = [...pendingRecords];
            if (cloudDataLoaded) combined.push(...cloudData);
            baseRecords = combined;
        }
        if (dataSourceMode === 'local') {
            baseRecords = isLocalMode ? pendingRecords : baseRecords.filter(r => new Date(r.scanned_at) >= sessionStartTime);
        } else if (dataSourceMode === 'cloud') {
            baseRecords = (isLocalMode || !cloudDataLoaded) ? [] : [...cloudData];
        } else {
            baseRecords = isLocalMode ? pendingRecords : [...pendingRecords, ...(cloudDataLoaded ? cloudData : [])];
        }
        if (searchKeyword) {
            const kw = searchKeyword.toLowerCase();
            baseRecords = baseRecords.filter(r => r.tracking_number.toLowerCase().includes(kw) || (r.carrier && r.carrier.toLowerCase().includes(kw)));
        }
        groupedRecords = groupRecords(baseRecords);
        allRecords = baseRecords;
        renderStats(allRecords);
        currentPage = 1;
        renderPage();
    }

    function renderStats(records) {
        totalCountSpan.innerText = records.length;
        uniqueCountSpan.innerText = new Set(records.map(r => r.tracking_number)).size;
        const carrierCount = {};
        records.forEach(r => { const c = r.carrier || '未知'; carrierCount[c] = (carrierCount[c]||0)+1; });
        carrierStatsDiv.innerHTML = Object.entries(carrierCount).map(([n,c]) => `<span class="carrier-stat">${n}: ${c}</span>`).join('');
    }

    function renderPage() {
        const totalPages = Math.ceil(groupedRecords.length / pageSize) || 1;
        if (currentPage<1) currentPage=1; if (currentPage>totalPages) currentPage=totalPages;
        const start = (currentPage-1)*pageSize;
        const end = start+pageSize;
        const pageGroups = groupedRecords.slice(start,end);
        renderGroupTable(pageGroups);
        pageInfo.innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
        prevPageBtn.disabled = currentPage <= 1;
        nextPageBtn.disabled = currentPage >= totalPages;
    }

    function renderGroupTable(groups) {
        if (groups.length === 0) { historyBody.innerHTML = ''; noDataMsg.style.display = 'block'; return; }
        noDataMsg.style.display = 'none';
        historyBody.innerHTML = groups.map(group => {
            const hasPhoto = group.records.some(r => r.photo_url) ? '📸' : '无';
            return `
            <tr>
                <td>${escapeHtml(group.tracking_number)}</td>
                <td><span class="carrier-badge">${escapeHtml(group.carrier || '未知')}</span></td>
                <td>${new Date(group.first_time).toLocaleString()}</td>
                <td>${new Date(group.last_time).toLocaleString()}</td>
                <td>${group.count}</td>
                <td>${hasPhoto}</td>
                <td><button class="detail-btn" data-number="${escapeHtml(group.tracking_number)}">📋 详情</button></td>
            </tr>
        `}).join('');
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                const number = e.target.dataset.number;
                const group = groupedRecords.find(g => g.tracking_number === number);
                if (group) showDetailModal(number, group.records);
            });
        });
    }

    async function deleteRecord(localId, cloudId) {
        if (localId) { pendingRecords = pendingRecords.filter(r => r.localId !== localId); savePendingToStorage(); }
        if (!isLocalMode && cloudId) {
            try { await sbClient.from('scans').delete().eq('id', cloudId).eq('user_id', currentUser.id); if (cloudDataLoaded) cloudData = cloudData.filter(r => r.id !== cloudId); }
            catch (err) { showToast('删除失败', 'error'); return false; }
        }
        return true;
    }

    function findLastScanTime(trackingNumber) {
        const records = allRecords.filter(r => r.tracking_number === trackingNumber);
        if (!records.length) return null;
        records.sort((a,b) => new Date(b.scanned_at) - new Date(a.scanned_at));
        return new Date(records[0].scanned_at);
    }

    // ================== 按范围删除 ==================
    async function clearRecordsByRange() {
        const range = clearRangeSelect.value;
        let startTime = null, rangeDesc = '';
        if (range === 'session') {
            if (isLocalMode) { showToast('本地模式无法按本次登录删除', 'warning'); return; }
            if (!sessionStartTime) { showToast('无法确定本次登录时间', 'error'); return; }
            startTime = sessionStartTime; rangeDesc = '本次扫码';
        } else if (range === 'day') { startTime = new Date(Date.now()-24*60*60*1000); rangeDesc = '最近一天'; }
        else if (range === 'week') { startTime = new Date(Date.now()-7*24*60*60*1000); rangeDesc = '最近一周'; }
        else { startTime = null; rangeDesc = '全部'; }

        let toDelete = startTime ? allRecords.filter(r => new Date(r.scanned_at) >= startTime) : allRecords;
        if (toDelete.length === 0) { showToast('所选范围内没有记录', 'warning'); return; }
        if (!confirm(`确定删除 ${rangeDesc} 的 ${toDelete.length} 条记录吗？`)) return;

        if (!isLocalMode && isOnline && currentUser) {
            try {
                let query = sbClient.from('scans').delete().eq('user_id', currentUser.id);
                if (startTime) query = query.gte('scanned_at', startTime.toISOString());
                await query;
            } catch (err) { showToast('删除云端失败', 'error'); return; }
        }
        if (startTime) pendingRecords = pendingRecords.filter(r => new Date(r.scanned_at) < startTime);
        else pendingRecords = [];
        savePendingToStorage();
        if (!isLocalMode && cloudDataLoaded) await loadCloudData();
        applyDataSource();
        updateSyncStatusUI();
    }

    // ================== 数据源切换 ==================
    function setDataSource(mode) {
        dataSourceMode = mode;
        [dataSourceLocal, dataSourceCloud, dataSourceAll].forEach(btn => btn.classList.remove('active'));
        if (mode === 'local') dataSourceLocal.classList.add('active');
        else if (mode === 'cloud') dataSourceCloud.classList.add('active');
        else dataSourceAll.classList.add('active');
        if (!isLocalMode && (mode === 'cloud' || mode === 'all') && !cloudDataLoaded) {
            loadCloudData().then(() => applyDataSource());
        } else applyDataSource();
    }
    dataSourceLocal.addEventListener('click', () => setDataSource('local'));
    dataSourceCloud.addEventListener('click', () => setDataSource('cloud'));
    dataSourceAll.addEventListener('click', () => setDataSource('all'));

    // ================== 限制检查（本地2次，当天3次，当月5次）==================
    async function checkLimits(trackingNumber) {
        const localCount = pendingRecords.filter(r => r.tracking_number === trackingNumber).length;
        if (localCount >= 2) {
            return { allowed: false, reason: '本设备上该单号已扫描2次' };
        }
        if (isLocalMode || !isOnline || !currentUser) return { allowed: true };
        const now = new Date();
        const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
        try {
            const { count: dayCount } = await sbClient
                .from('scans')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id)
                .eq('tracking_number', trackingNumber)
                .gte('scanned_at', startOfDay);
            const { count: monthCount } = await sbClient
                .from('scans')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id)
                .eq('tracking_number', trackingNumber)
                .gte('scanned_at', startOfMonth);
            if (dayCount >= 3) return { allowed: false, reason: '当天该单号已扫描3次' };
            if (monthCount >= 5) return { allowed: false, reason: '当月该单号已扫描5次' };
            return { allowed: true };
        } catch (err) { return { allowed: true }; }
    }

    // ================== 拍照上传（按单号命名）==================
    function getVideoElement() { return document.querySelector('#interactive video'); }
    async function captureAndUploadPhoto(trackingNumber) {
        if (!currentUser || isLocalMode) return null;
        const video = getVideoElement();
        if (!video || video.readyState < 2) { console.warn('摄像头未就绪'); return null; }
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
        if (!blob) return null;
        let existingPhotos = 0;
        if (cloudDataLoaded) {
            existingPhotos = cloudData.filter(r => r.tracking_number === trackingNumber && r.photo_url).length;
        }
        existingPhotos += pendingRecords.filter(r => r.tracking_number === trackingNumber && r.photo_url).length;
        const nextNum = existingPhotos + 1;
        const fileName = `${trackingNumber}/${trackingNumber}-${nextNum}.jpg`;
        const { error } = await sbClient.storage.from('scan-photos').upload(fileName, blob, { contentType: 'image/jpeg', cacheControl: '3600' });
        if (error) { console.error('照片上传失败', error); return null; }
        const { data: { publicUrl } } = sbClient.storage.from('scan-photos').getPublicUrl(fileName);
        return publicUrl;
    }

    async function saveScanWithPhoto(trackingNumber, carrier, notes, photoUrl) {
        if (!currentUser && !isLocalMode) return false;
        const record = { tracking_number: trackingNumber, carrier, notes, photo_url: photoUrl, scanned_at: new Date().toISOString() };
        if (!isLocalMode && isOnline && currentUser) {
            try {
                await sbClient.from('scans').insert([{ ...record, user_id: currentUser.id }]);
                if (cloudDataLoaded) await loadCloudData();
                return true;
            } catch (err) {
                addPendingRecord(record);
                return true;
            }
        } else {
            addPendingRecord(record);
            return true;
        }
    }

    // ================== 处理扫码结果（添加处理中标记，暂停扫码防止并发）==================
    async function handleTrackingNumber(trackingNumber) {
        // 如果该单号正在处理中，直接忽略本次触发
        if (window.processingTrackingNumbers.has(trackingNumber)) {
            console.log('单号正在处理中，忽略重复触发');
            return;
        }

        const now = Date.now();
        // 原有防重：5秒内相同单号忽略
        if (trackingNumber === lastScannedCode && now - lastScanTime < 5000) {
            speak('重复'); vibrate('repeat');
            showToast('⚠️ 5秒内重复扫码，已忽略', 'warning');
            return;
        }

        // 标记开始处理
        window.processingTrackingNumbers.add(trackingNumber);

        // 如果当前正在扫码，暂停解码以避免处理期间的新触发
        let wasScanning = isScanning;
        if (wasScanning) {
            try { Quagga.pause(); } catch(e) { console.warn('暂停扫码失败', e); }
        }

        try {
            lastScannedCode = trackingNumber;
            lastScanTime = now;

            const carrier = detectCarrier(trackingNumber);
            if (!carrier) {
                speak('错误'); vibrate('error');
                showToast('❌ 无效的快递单号', 'error');
                currentResult.style.display = 'none';
                return;
            }

            const limitCheck = await checkLimits(trackingNumber);
            if (!limitCheck.allowed) {
                const userConfirm = confirm(`⚠️ 限制提醒：${limitCheck.reason}。是否仍然保存？`);
                if (!userConfirm) {
                    speak('已取消'); showToast('保存已取消', 'warning');
                    return;
                }
            }

            const note = getCurrentNote();
            const lastTime = findLastScanTime(trackingNumber);
            const isDuplicate = lastTime !== null;

            let photoUrl = null;
            if (!isLocalMode && isOnline && currentUser) {
                photoUrl = await captureAndUploadPhoto(trackingNumber);
                photoHint.innerText = photoUrl ? '📸 已拍照' : '📸 拍照失败';
            } else {
                photoHint.innerText = '';
            }

            await saveScanWithPhoto(trackingNumber, carrier, note, photoUrl);

            // 刷新数据
            allRecords = [...pendingRecords];
            if (cloudDataLoaded) allRecords.push(...cloudData);
            groupedRecords = groupRecords(allRecords);
            renderPage();
            renderStats(allRecords);
            updateSyncStatusUI();

            if (isDuplicate) { speak('重复'); vibrate('repeat'); } else { speak('成功'); vibrate('success'); }
            showScanToast(trackingNumber);
            currentResult.style.display = 'block';
            trackingSpan.innerText = trackingNumber;
            carrierSpan.innerHTML = `<span class="carrier-badge">${carrier}</span>`;
            scannedAtSpan.innerText = new Date().toLocaleString();
            duplicateHint.innerText = isDuplicate ? `⏰ 上次扫描：${lastTime.toLocaleString()}` : '';
            showToast(isDuplicate ? '重复扫描，已保存' : '扫描成功', isDuplicate ? 'warning' : 'success');
        } finally {
            // 移除处理标记
            window.processingTrackingNumbers.delete(trackingNumber);
            // 恢复扫码（如果之前是运行的）
            if (wasScanning) {
                try { Quagga.resume(); } catch(e) { console.warn('恢复扫码失败', e); }
            }
        }
    }

    function detectCarrier(tn) {
        for (let r of carrierRules) if (r.regex.test(tn)) return r.name;
        return null;
    }

    // ================== 扫码初始化 ==================
    let quaggaInitialized = false, quaggaInitPending = false;
    function initScanner(cb) {
        if (quaggaInitPending) { setTimeout(() => initScanner(cb), 200); return; }
        quaggaInitPending = true;
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { width: 640, height: 480, facingMode: "environment" } },
            decoder: { readers: ["code_128_reader","ean_reader","ean_8_reader","code_39_reader","codabar_reader","upc_reader","i2of5_reader"] }
        }, err => {
            quaggaInitPending = false;
            if (err) { showToast('无法启动摄像头', 'error'); if (cb) cb(false); }
            else { quaggaInitialized = true; if (cb) cb(true); }
        });
    }
    function startScanner() {
        if (!currentUser && !isLocalMode) return;
        if (speechEnabled) speak('扫码启动');
        try { Quagga.stop(); } catch(e) {}
        quaggaInitialized = false; quaggaInitPending = false;
        initScanner(success => {
            if (success) {
                setTimeout(() => { Quagga.start(); isScanning = true; updateScanButtons(); showToast('扫码已启动', 'success'); }, 100);
            } else showToast('启动摄像头失败', 'error');
        });
    }
    function pauseScanner() {
        if (quaggaInitialized && isScanning) {
            Quagga.stop(); isScanning = false; updateScanButtons();
            if (speechEnabled) speak('扫码暂停');
            showToast('扫码已暂停', 'warning');
        }
    }
    function updateScanButtons() {
        if (isScanning) { startScanBtn.style.display = 'none'; pauseScanBtn.style.display = 'inline-block'; }
        else { startScanBtn.style.display = 'inline-block'; pauseScanBtn.style.display = 'none'; }
    }
    Quagga.onDetected(result => {
        if (!isScanning || (!currentUser && !isLocalMode)) return;
        const code = result.codeResult.code;
        if (code) handleTrackingNumber(code);
    });

    // ================== 用户认证 ==================
    function showAuth() {
        authArea.style.display = 'block';
        mainApp.style.display = 'none';
        userHeader.style.display = 'none';
        if (quaggaInitialized && isScanning) Quagga.stop();
    }
    function showApp(user) {
        authArea.style.display = 'none';
        mainApp.style.display = 'block';
        userHeader.style.display = 'flex';
        userInfoDiv.innerText = `👤 ${user.email}`;
        if (isLocalMode) {
            dataSourceCloud.disabled = true;
            syncStatusDiv.style.display = 'none';
            localModeBadge.style.display = 'flex';
        } else {
            dataSourceCloud.disabled = false;
            syncStatusDiv.style.display = 'flex';
            localModeBadge.style.display = 'none';
        }
        loadPendingFromStorage();
        updateScanButtons();
        loadNoteOptions();
        noteLocked = false; lockedNote = ''; noteInput.value = ''; updateLockUI();
        if (isLocalMode) {
            cloudDataLoaded = false; cloudData = [];
            applyDataSource();
        } else {
            sessionStartTime = new Date();
            setDataSource('local');
        }
    }
    function enterLocalMode() {
        currentUser = null;
        isLocalMode = true;
        userInfoDiv.innerText = '📱 本地模式';
        showApp(null);
    }
    async function handleLoginSuccess(user) {
        currentUser = user;
        isLocalMode = false;
        sessionStartTime = new Date();
        showApp(user);
        if (pendingRecords.length > 0) {
            speak('开始同步本地记录');
            await syncPendingRecords();
        } else loadCloudData();
    }

    sbClient.auth.onAuthStateChange((event, session) => {
        if (session && !isLocalMode) { currentUser = session.user; handleLoginSuccess(currentUser); }
        else if (!session && !isLocalMode) { currentUser = null; showAuth(); }
    });
    sbClient.auth.getSession().then(({ data: { session } }) => {
        if (session) { currentUser = session.user; handleLoginSuccess(currentUser); }
        else showAuth();
    });

    loginBtn.addEventListener('click', async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        loginError.innerText = '';
        try {
            const { error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
        } catch (err) {
            loginError.innerText = err.message;
        }
    });

    signupBtn.addEventListener('click', async () => {
        const email = signupEmail.value.trim();
        const password = signupPassword.value;
        const confirm = signupConfirm.value;
        if (password !== confirm) { signupError.innerText = '两次密码不一致'; return; }
        signupError.innerText = '';
        try {
            const { error } = await sbClient.auth.signUp({ email, password });
            if (error) throw error;
            showToast('注册成功！请登录', 'success');
            loginTab.click();
        } catch (err) { signupError.innerText = err.message; }
    });

    logoutBtn.addEventListener('click', async () => {
        if (!isLocalMode) { pauseScanner(); await sbClient.auth.signOut(); }
        currentUser = null; isLocalMode = false; showAuth();
    });

    // 登录/注册界面切换
    loginTab.addEventListener('click', () => {
        loginTab.classList.add('active'); signupTab.classList.remove('active');
        loginForm.style.display = 'flex'; signupForm.style.display = 'none';
        switchToSignup.style.display = 'inline'; switchToLogin.style.display = 'none';
    });
    signupTab.addEventListener('click', () => {
        signupTab.classList.add('active'); loginTab.classList.remove('active');
        signupForm.style.display = 'flex'; loginForm.style.display = 'none';
        switchToLogin.style.display = 'inline'; switchToSignup.style.display = 'none';
    });
    switchToSignup.addEventListener('click', () => signupTab.click());
    switchToLogin.addEventListener('click', () => loginTab.click());
    localModeBtn.addEventListener('click', enterLocalMode);

    // ================== 其他事件 ==================
    startScanBtn.addEventListener('click', startScanner);
    pauseScanBtn.addEventListener('click', pauseScanner);
    clearRangeBtn.addEventListener('click', clearRecordsByRange);
    prevPageBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
    nextPageBtn.addEventListener('click', () => { if (currentPage < Math.ceil(groupedRecords.length/pageSize)) { currentPage++; renderPage(); } });
    syncStatusDiv.addEventListener('click', () => {
        if (isLocalMode) return;
        if (isOnline && pendingRecords.length > 0) { speak('开始同步'); syncPendingRecords(); }
        else if (!isOnline) { speak('离线无法同步'); showToast('当前处于离线状态，无法同步', 'error'); }
        else { speak('所有记录已同步'); showToast('所有记录已同步', 'success'); }
    });
    exportCsvBtn.addEventListener('click', async () => {
        let records = allRecords;
        if (!records.length) { showToast('暂无数据', 'warning'); return; }
        const headers = ['单号','快递公司','扫描时间','备注'];
        const rows = records.map(r => [r.tracking_number, r.carrier||'', new Date(r.scanned_at).toLocaleString(), r.notes||'']);
        const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `快递记录_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    });
    exportXlsxBtn.addEventListener('click', async () => {
        let records = allRecords;
        if (!records.length) { showToast('暂无数据', 'warning'); return; }
        const data = records.map(r => ({ '单号': r.tracking_number, '快递公司': r.carrier||'', '扫描时间': new Date(r.scanned_at).toLocaleString(), '备注': r.notes||'' }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '扫描记录');
        XLSX.writeFile(wb, `快递记录_${new Date().toISOString().slice(0,10)}.xlsx`);
    });

    // ================== 工具函数 ==================
    function escapeHtml(unsafe) { return unsafe.replace(/[&<>"']/g, m => { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; if(m==='"') return '&quot;'; if(m==="'") return '&#039;'; return m; }); }

    // 初始化
    loadPendingFromStorage();
    loadSoundPreference();
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
    }
</script>
</body>
