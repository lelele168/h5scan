<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>快递扫码 · 拍照版</title>
    <!-- QuaggaJS 扫码库 -->
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <!-- Supabase JS 客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- SheetJS 用于导出 XLSX -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        /* 样式与之前版本基本一致，略作调整，但保留所有功能 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 12px;
            color: #1e293b;
        }
        .app { max-width: 1200px; width: 100%; }
        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.02);
            margin-bottom: 20px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 60px;
        }
        .status-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f1f5f9;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
        }
        .sync-status.online { color: #10b981; }
        .sync-status.offline { color: #ef4444; }
        .sync-status.syncing { color: #f59e0b; }
        .local-mode-badge {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sound-toggle {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .sound-toggle.on { color: #0284c7; }
        .sound-toggle.off { color: #94a3b8; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: #e2e8f0;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary { background: #0284c7; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 8px 16px; font-size: 0.9rem; }
        .scanner-container {
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #0f172a;
            margin: 20px 0;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1);
        }
        #interactive.viewport {
            position: relative;
            width: 100%;
            max-height: 400px;
            overflow: hidden;
        }
        #interactive.viewport video, #interactive.viewport canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        .scanner-controls { display: flex; gap: 12px; margin: 16px 0; justify-content: center; flex-wrap: wrap; }
        .manual-section { display: flex; gap: 12px; margin: 20px 0; justify-content: center; flex-wrap: wrap; }
        .note-section {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            align-items: center;
            flex-wrap: wrap;
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 60px;
        }
        .note-section input {
            flex: 1 1 180px;
            min-width: 150px;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .lock-toggle {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .lock-toggle.locked { color: #0284c7; border-color: #0284c7; background: #e0f2fe; }
        .lock-toggle.unlocked { color: #94a3b8; }
        .result-card {
            background: #e0f2fe;
            padding: 20px;
            border-radius: 24px;
            margin: 20px 0;
            border-left: 6px solid #0284c7;
        }
        .result-card.invalid { border-left-color: #ef4444; background: #fee2e2; }
        .carrier-badge {
            background: #0284c7;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: inline-block;
            font-weight: 600;
        }
        .pending-badge {
            background: #f59e0b;
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-left: 6px;
        }
        .stats-panel {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            align-items: center;
            border: 1px solid #e2e8f0;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #0f172a; }
        .carrier-stats { display: flex; flex-wrap: wrap; gap: 12px; }
        .carrier-stat {
            background: white;
            padding: 6px 16px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin: 20px 0;
            background: #f8fafc;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
        }
        .search-box {
            flex: 1 1 200px;
            min-width: 180px;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .clear-select {
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        .data-source-switch {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .data-source-switch button {
            padding: 8px 20px;
            border: none;
            border-radius: 40px;
            background: white;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }
        .data-source-switch button.active {
            background: #0284c7;
            color: white;
            border-color: #0284c7;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            font-size: 0.95rem;
            min-width: 700px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        th {
            padding: 16px 12px;
            background: #f1f5f9;
            font-weight: 600;
            text-align: left;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:nth-child(even) td { background: #fafafa; }
        .copy-btn, .delete-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; }
        .copy-btn { color: #0284c7; }
        .delete-btn { color: #ef4444; }
        .export-btn { background: #0f172a; color: white; }
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            background: #f1f5f9;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid #e2e8f0;
        }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .toast-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .toast-message.show { opacity: 1; }
        .scan-toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .scan-toast.show { opacity: 1; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 3000;
            padding: 16px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 28px;
            max-width: 400px;
            width: 100%;
        }
        .modal-content input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            margin-bottom: 16px;
        }
        .test-sound { margin: 12px 0; text-align: center; }
        .test-sound button {
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            padding: 10px 28px;
            cursor: pointer;
        }
        @media (max-width: 640px) {
            .stats-panel { flex-direction: column; align-items: flex-start; }
            .toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="card">
        <div class="header-row">
            <h1>📦 快递扫码 · 拍照版</h1>
            <div class="status-bar">
                <button id="soundToggleBtn" class="sound-toggle on" title="声音提醒">🔊 声音</button>
                <div id="syncStatus" class="sync-status online" style="display: none;">🟢 在线</div>
                <div id="localModeBadge" class="local-mode-badge" style="display: none;">📱 本地模式</div>
            </div>
        </div>

        <div id="userHeader" class="user-header" style="display: none;">
            <div id="userInfo"></div>
            <button id="logoutBtn" class="btn btn-sm">退出登录</button>
        </div>

        <!-- 认证区域 -->
        <div id="authArea" class="auth-container" style="max-width:400px; margin:40px auto;">
            <div class="auth-title" style="font-size:1.8rem; font-weight:700; text-align:center;">集派快递</div>
            <div class="auth-subtitle" style="text-align:center; color:#64748b;">扫码录入快人一步</div>
            <div class="tabs" style="display:flex; gap:12px; justify-content:center; margin-bottom:24px;">
                <button id="loginTab" class="tab-btn active">登录</button>
                <button id="signupTab" class="tab-btn">注册</button>
            </div>
            <div id="loginForm" class="auth-form" style="display:flex; flex-direction:column; gap:16px;">
                <input type="email" id="loginEmail" placeholder="邮箱" required>
                <input type="password" id="loginPassword" placeholder="密码" required>
                <button id="loginBtn" class="btn btn-primary">登录</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="signupForm" class="auth-form" style="display:none; flex-direction:column; gap:16px;">
                <input type="text" id="signupUsername" placeholder="用户名（选填）">
                <input type="email" id="signupEmail" placeholder="邮箱*" required>
                <input type="password" id="signupPassword" placeholder="密码（至少6位）*" required>
                <input type="password" id="signupConfirm" placeholder="确认密码*" required>
                <button id="signupBtn" class="btn btn-primary">注册</button>
                <div id="signupError" class="error-msg"></div>
            </div>
            <div class="auth-footer" style="text-align:center; margin-top:20px;">
                <span id="switchToSignup">还没有账号？立即注册→</span>
                <span id="switchToLogin" style="display:none;">已有账号？立即登录</span>
            </div>
            <button id="localModeBtn" class="btn btn-secondary" style="width:100%; margin-top:20px;">📱 本地模式（无需登录）</button>
        </div>

        <!-- 主应用区域 -->
        <div id="mainApp" style="display: none;">
            <div class="scanner-container">
                <div id="interactive" class="viewport"></div>
            </div>
            <div class="scanner-controls">
                <button id="startScanBtn" class="btn btn-success">▶️ 开始扫码</button>
                <button id="pauseScanBtn" class="btn btn-warning" style="display: none;">⏸️ 暂停扫码</button>
            </div>

            <div class="manual-section">
                <button id="manualBtn" class="btn btn-primary">📝 手动输入</button>
            </div>

            <div class="note-section">
                <input type="text" id="noteInput" placeholder="备注（可输可选）" list="noteOptionsDatalist">
                <datalist id="noteOptionsDatalist"></datalist>
                <button id="lockToggleBtn" class="lock-toggle unlocked" title="锁定备注">🔓 锁定</button>
            </div>

            <div class="test-sound">
                <button id="testSoundBtn">🔊 测试声音</button>
            </div>

            <div id="currentResult" class="result-card" style="display: none;">
                <h3>📌 最新扫描</h3>
                <p><strong>单号：</strong> <span id="trackingNumber"></span></p>
                <p><strong>快递公司：</strong> <span id="carrier"></span></p>
                <p><strong>时间：</strong> <span id="scannedAt"></span></p>
                <p id="duplicateHint" style="color: #f59e0b;"></p>
                <p id="photoHint" style="color: #10b981; margin-top:8px;"></p>
            </div>

            <!-- 统计面板 -->
            <div class="stats-panel" id="statsPanel">
                <div class="stat-item"><span class="stat-label">总记录数</span><span class="stat-value" id="totalCount">0</span></div>
                <div class="stat-item"><span class="stat-label">唯一单号</span><span class="stat-value" id="uniqueCount">0</span></div>
                <div class="carrier-stats" id="carrierStats"></div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <button id="searchBtn" class="btn btn-primary">🔍 搜索</button>
                <select id="clearRangeSelect" class="clear-select">
                    <option value="session">本次扫码</option>
                    <option value="day">最近一天</option>
                    <option value="week">最近一周</option>
                    <option value="all">全部</option>
                </select>
                <button id="clearRangeBtn" class="btn btn-danger">🗑️ 清空所选范围</button>
                <div class="data-source-switch">
                    <button id="dataSourceLocal" class="active">本地数据</button>
                    <button id="dataSourceCloud" class="cloud-btn">云端数据</button>
                    <button id="dataSourceAll">全部数据</button>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="exportCsvBtn" class="btn export-btn">📥 CSV</button>
                    <button id="exportXlsxBtn" class="btn btn-success">📊 XLSX</button>
                </div>
            </div>

            <!-- 数据表格 -->
            <div style="overflow-x: auto;">
                <table id="historyTable">
                    <thead><tr><th>单号</th><th>快递公司</th><th>扫描时间</th><th>备注</th><th>照片</th><th style="width:80px">操作</th></tr></thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
            <p id="noDataMsg" style="color:#94a3b8; text-align:center; padding:30px;">暂无记录</p>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button id="prevPageBtn" disabled>◀ 上一页</button>
                <span id="pageInfo">第 1 页 / 共 1 页</span>
                <button id="nextPageBtn" disabled>下一页 ▶</button>
            </div>
        </div>
    </div>
    <div class="footer-note">🔒 数据仅自己可见 · 离线自动同步 · 支持拍照上传</div>
</div>

<!-- 手动输入模态框 -->
<div id="manualModal" class="modal">
    <div class="modal-content">
        <h3>📝 手动输入单号</h3>
        <input type="text" id="manualModalInput" placeholder="请输入快递单号" autocomplete="off">
        <div class="modal-buttons"><button id="manualModalCancel" class="btn">取消</button><button id="manualModalConfirm" class="btn btn-primary">确认</button></div>
    </div>
</div>

<!-- 搜索模态框 -->
<div id="searchModal" class="modal">
    <div class="modal-content">
        <h3>🔍 搜索记录</h3>
        <input type="text" id="searchInput" placeholder="输入单号或快递公司" autocomplete="off">
        <div style="display: flex; gap:12px; margin-bottom:20px;"><button id="scanSearchBtn" class="btn btn-success">📷 扫码搜索</button></div>
        <div class="modal-buttons"><button id="searchModalCancel" class="btn">取消</button><button id="searchModalConfirm" class="btn btn-primary">搜索</button></div>
    </div>
</div>

<!-- 全局提示 -->
<div id="toast" class="toast-message"></div>
<div id="scanToast" class="scan-toast"></div>

<script>
    // ================== 配置 ==================
    const SUPABASE_URL = 'https://vmkpymrujtvguvmzcisc.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_RKS87lNw-yOvLeZ9PU2SEw_U-3mKNUu';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 快递公司识别规则
    const carrierRules = [
        { name: '顺丰快递', regex: /^SF\d{13}$/i },
        { name: '圆通快递', regex: /^YT\d{13}$/i },
        { name: '中通快递', regex: /^(73|75|78)\d{11}$/ },
        { name: '申通快递', regex: /^(777|772)\d{12}$/ },
        { name: '韵达快递', regex: /^(46|43|31|32)\d{11,13}$/ },
        { name: '极兔快递', regex: /^JT\d{13}$/i },
        { name: 'EMS', regex: /^13\d{11}$/ },
        { name: '邮政快递', regex: /^(98|82)\d{11}$/ }
    ];

    let currentUser = null;
    let pendingRecords = [];
    let isOnline = navigator.onLine;
    let isScanning = false;
    let lastScannedCode = '';
    let lastScanTime = 0;
    let allRecords = [];
    let cloudData = [];
    let sessionStartTime = null;
    let cloudDataLoaded = false;
    let speechEnabled = true;
    let soundEnabled = true;
    let noteLocked = false;
    let lockedNote = '';
    let noteOptions = [];
    let currentPage = 1;
    const pageSize = 10;
    let groupedRecords = [];
    let dataSourceMode = 'local';
    let searchKeyword = '';

    // 获取 video 元素（用于拍照）
    function getVideoElement() {
        return document.querySelector('#interactive video');
    }

    // 拍照并上传到 Supabase Storage
    async function captureAndUploadPhoto() {
        const video = getVideoElement();
        if (!video || video.readyState < 2) {
            console.warn('摄像头未就绪，无法拍照');
            return null;
        }
        // 创建 canvas 并绘制当前帧
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        // 转换为 blob
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.8));
        if (!blob) return null;

        // 生成文件名：用户ID/时间戳-随机数.jpg
        const fileName = `${currentUser.id}/${Date.now()}-${Math.random().toString(36).substring(2)}.jpg`;
        // 上传
        const { error } = await sbClient.storage.from('scan-photos').upload(fileName, blob, {
            contentType: 'image/jpeg',
            cacheControl: '3600'
        });
        if (error) {
            console.error('照片上传失败', error);
            return null;
        }
        // 获取公共 URL
        const { data: { publicUrl } } = sbClient.storage.from('scan-photos').getPublicUrl(fileName);
        return publicUrl;
    }

    // 保存扫描记录（含照片URL）
    async function saveScanWithPhoto(trackingNumber, carrier, notes, photoUrl) {
        if (!currentUser) return false;
        const record = {
            tracking_number: trackingNumber,
            carrier,
            notes,
            photo_url: photoUrl,
            scanned_at: new Date().toISOString()
        };
        if (isOnline && !isLocalMode) {
            try {
                await sbClient.from('scans').insert([{ ...record, user_id: currentUser.id }]);
                if (cloudDataLoaded) await loadCloudData();
                applyDataSource();
                return true;
            } catch (err) {
                addPendingRecord(record);
                applyDataSource();
                return true;
            }
        } else {
            addPendingRecord(record);
            applyDataSource();
            return true;
        }
    }

    // 重写 handleTrackingNumber，加入拍照逻辑
    async function handleTrackingNumber(trackingNumber) {
        const now = Date.now();
        if (trackingNumber === lastScannedCode && (now - lastScanTime) < 5000) {
            speak('重复');
            vibrate('repeat');
            showToast('⚠️ 5秒内重复扫码，已忽略', 'warning');
            return;
        }
        lastScannedCode = trackingNumber;
        lastScanTime = now;

        const carrier = detectCarrier(trackingNumber);
        if (carrier === null) {
            speak('错误');
            vibrate('error');
            showToast('❌ 无效的快递单号', 'error');
            currentResult.style.display = 'none';
            return;
        }

        const limitCheck = await checkLimits(trackingNumber);
        if (!limitCheck.allowed) {
            if (!confirm(`⚠️ 限制提醒：${limitCheck.reason}。是否仍然保存？`)) {
                speak('已取消');
                showToast('保存已取消', 'warning');
                return;
            }
        }

        const note = getCurrentNote();
        const lastTime = findLastScanTime(trackingNumber);
        const isDuplicate = lastTime !== null;

        let photoUrl = null;
        // 如果在线且已登录（非本地模式），尝试拍照上传
        if (isOnline && currentUser && !isLocalMode) {
            photoUrl = await captureAndUploadPhoto();
            if (photoUrl) {
                showToast('照片已上传', 'success');
                document.getElementById('photoHint').innerText = '📸 已拍照';
            } else {
                document.getElementById('photoHint').innerText = '📸 拍照失败';
            }
        } else {
            document.getElementById('photoHint').innerText = '';
        }

        // 保存记录
        await saveScanWithPhoto(trackingNumber, carrier, note, photoUrl);

        if (isDuplicate) { speak('重复'); vibrate('repeat'); } else { speak('成功'); vibrate('success'); }

        showScanToast(trackingNumber);
        currentResult.style.display = 'block';
        trackingSpan.innerText = trackingNumber;
        carrierSpan.innerHTML = `<span class="carrier-badge">${carrier}</span>`;
        scannedAtSpan.innerText = new Date().toLocaleString();
        duplicateHint.innerText = isDuplicate ? `⏰ 上次扫描：${lastTime.toLocaleString()}` : '';
        showToast(isDuplicate ? '重复扫描，已保存' : '扫描成功', isDuplicate ? 'warning' : 'success');
    }

    // 其余函数（语音、震动、存储、同步、数据源切换、用户认证等）与之前版本完全相同，篇幅所限省略，但实际代码中需完整保留。
